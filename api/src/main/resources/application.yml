server:
  port: ${APP_PORT:8080}
#  servlet:
#    context-path: /bo-portal

security:
  internal-secret: ${INTERNAL_SECRET_KEY:defaultSecretValue}
  internal-path-prefix: /bo-portal/internal/
  require-https: ${SECURITY_REQUIRE_HTTPS:false}
  hsts:
    enabled: ${SECURITY_HSTS_ENABLED:false}
    max-age: ${SECURITY_HSTS_MAX_AGE:31536000}
  login:
    rsa-private-key: ${LOGIN_RSA_PRIVATE_KEY:}
    rsa-public-key: ${LOGIN_RSA_PUBLIC_KEY:}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200}

spring:
  application:
    name: bo-portal
  profiles:
    active: prod
  config:
    import:
      - "classpath:client.yml"
  liquibase:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

feign:
  client:
    config:
      auth-service:
        url: ${AUTH_SERVICE_URL:http://localhost:8888}
      hrm-service:
        url: ${HRM_SERVICE_URL:http://localhost:8080}
      ticket-service:
        url: ${TICKET_SERVICE_URL:http://localhost:8080}
      lms-service:
        url: ${LMS_SERVICE_URL:http://localhost:6666}
      notification-service:
        url: ${NOTI_SERVICE_URL:http://notification-service:8080}
      audit-service:
        url: ${AUDIT_SERVICE_URL:http://audit-service:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-in-production}
    token:
      expires-in: ${APP_JWT_TOKEN_EXPIRES_IN:#{60 * 60 * 1000}} # 60 minutes in milliseconds
    refresh-token:
      expires-in: ${APP_JWT_REFRESH_TOKEN_EXPIRES_IN:#{24 * 60 * 60 * 1000}} # 24 hours in milliseconds

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    path: /swagger-ui.html
#  api-docs:
#    path: /v3/api-docs

configuration:
  timezone: ${TIMEZONE_CONFIG:Asia/Ho_Chi_Minh}

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include:
          - prometheus
          - health
          - metrics
          - loggers
      path-mapping:
        health: /actuator/health
        prometheus: /actuator/prometheus
        metrics: /actuator/metrics
        loggers: /actuator/loggers
  endpoint:
    prometheus:
      enabled: true
    health:
      probes:
        enabled: true
      livenessState:
        enabled: true
      readinessState:
        enabled: true
      show-components: always
    loggers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        "http.server.requests": true
        "http.client.requests": true
      percentiles:
        "http.server.requests": 0.5, 0.90, 0.95, 0.99
        "http.client.requests": 0.5, 0.90, 0.95, 0.99

idempotence:
  spring:
    package-to-scan: com.fis.boportalservice

logging:
  sensitive-fields: ${SENSITIVE_DATA:access_token,cvv,url}

threadPool:
  asyncTask:
    maxPoolSize: 10
    corePoolSize: 5
    queueCapacity: 10000

application:
  cache-ttl-default-days: 3

common:
  object-mapper:
    enabled: true
    serialize-long-as-string: true

services:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8765}
