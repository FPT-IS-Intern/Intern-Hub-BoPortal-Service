spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ih_bo_portal}}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariCP
      minimum-idle: ${HIKARI_CONNECTION_MIN:1}
      maximum-pool-size: ${HIKARI_CONNECTION_MAX:2}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:180000}
      auto-commit: true
      connection-init-sql: SELECT 1
      connection-test-query: SELECT 1
      schema: ${SCHEMA_NAME:ih_bo_portal}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect