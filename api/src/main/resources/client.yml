spring:
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariCP
      minimum-idle: ${HIKARI_CONNECTION_MIN:5}
      maximum-pool-size: ${HIKARI_CONNECTION_MAX:20}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime:  ${HIKARI_MAX_LIFETIME:1800000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:180000}
      auto-commit: true
      connection-init-sql: SELECT 1
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect